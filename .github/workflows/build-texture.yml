name: Build TRELLIS.2 Texture Docker Image

on:
  push:
    branches: [main, feat/trellis2-poc]
    paths:
      - "Dockerfile.texture"
      - "worker_texture.py"
      - ".github/workflows/build-texture.yml"
  workflow_dispatch:
    inputs:
      trellis2_base:
        description: "Base TRELLIS.2 image tag"
        required: false
        default: "ghcr.io/satanexist/paradox_worker:trellis2-latest"

jobs:
  build-texture:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          BASE="${{ github.event.inputs.trellis2_base }}"
          if [ -z "$BASE" ]; then
            BASE="ghcr.io/satanexist/paradox_worker:trellis2-latest"
          fi
          echo "trellis2_base=${BASE}" >> "$GITHUB_OUTPUT"

      - name: Build and push texture image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.texture
          push: true
          build-args: |
            PARADOX_BUILD_SHA=${{ github.sha }}
            TRELLIS2_BASE=${{ steps.meta.outputs.trellis2_base }}
          tags: |
            ghcr.io/satanexist/paradox_worker:texture-latest
            ghcr.io/satanexist/paradox_worker:texture-sha-${{ steps.meta.outputs.short_sha }}
