name: Build and Publish Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      promote_to_stable:
        description: "Promote a version tag (e.g. v2026-07-10-1) to :stable"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Compute image tags
      id: meta
      shell: bash
      run: |
        DATE_TAG="v$(date -u +'%Y-%m-%d')-${GITHUB_RUN_NUMBER}"
        SHORT_SHA="${GITHUB_SHA::7}"
        echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"
        echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        build-args: |
          PARADOX_BUILD_SHA=${{ github.sha }}
        tags: |
          ghcr.io/satanexist/paradox_worker:latest
          ghcr.io/satanexist/paradox_worker:${{ steps.meta.outputs.date_tag }}
          ghcr.io/satanexist/paradox_worker:sha-${{ steps.meta.outputs.short_sha }}

  promote-stable:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.promote_to_stable != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Promote selected tag to stable
      shell: bash
      run: |
        SRC="ghcr.io/satanexist/paradox_worker:${{ inputs.promote_to_stable }}"
        DST="ghcr.io/satanexist/paradox_worker:stable"
        echo "Promoting ${SRC} -> ${DST}"
        docker buildx imagetools create -t "${DST}" "${SRC}"