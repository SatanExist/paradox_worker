name: Build TRELLIS.2 Docker Image

on:
  push:
    branches: [main, feat/trellis2-poc]
    paths:
      - "Dockerfile.trellis2"
      - "worker_trellis2.py"
      - "docker/**"
      - ".github/workflows/build-trellis2.yml"
  workflow_dispatch:

jobs:
  build-trellis2:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push TRELLIS.2 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.trellis2
          push: true
          build-args: |
            PARADOX_BUILD_SHA=${{ github.sha }}
          tags: |
            ghcr.io/satanexist/paradox_worker:trellis2-latest
            ghcr.io/satanexist/paradox_worker:trellis2-sha-${{ steps.meta.outputs.short_sha }}
